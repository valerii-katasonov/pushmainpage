<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Push School - Кабінет з Історією</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    body { 
      font-family: 'Montserrat', sans-serif; 
      background: linear-gradient(135deg, #f0f8ff, #e6e6fa);
      min-height: 100vh; margin: 0; display: flex; justify-content: center; align-items: center; padding: 20px;
    }
    .container { 
      background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px);
      max-width: 500px; width: 100%; padding: 30px; border-radius: 20px; 
      box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
    }
    h2 { color: #006d77; text-align: center; margin-top: 0; }
    .date-picker-box { background: #e0f2f1; padding: 15px; border-radius: 12px; margin-bottom: 20px; text-align: center; }
    label { display: block; margin-top: 15px; font-weight: 600; color: #333; font-size: 0.9rem; }
    input, select, textarea { 
      width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; 
      border-radius: 12px; box-sizing: border-box; font-family: inherit; font-size: 1rem;
    }
    button { 
      width: 100%; padding: 15px; border: none; border-radius: 12px; cursor: pointer; 
      font-weight: bold; font-size: 1rem; transition: 0.3s; margin-top: 20px;
    }
    .btn-login { background: linear-gradient(135deg, #00f2fe, #4facfe); color: white; }
    .btn-logout { background: #ff4757; color: white; margin-top: 30px;}
    .btn-save { background: linear-gradient(135deg, #43e97b, #38f9d7); color: #1a1a1a; }
    
    .panel { display: none; }
    .data-card { background: #fff; padding: 15px; border-left: 4px solid #006d77; border-radius: 8px; margin-top: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    #status-msg { text-align: center; color: #2ed573; font-weight: bold; display: none; margin-top: 10px; }
  </style>
</head>
<body>

<div class="container">
  
  <div id="login-screen" class="panel" style="display: block;">
    <h2>Вхід до порталу</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="pass" placeholder="Пароль">
    <button class="btn-login" onclick="loginUser()">Увійти</button>
    <p id="login-error" style="color:red; text-align:center; display:none;"></p>
  </div>

  <div id="calendar-block" style="display: none;" class="date-picker-box">
    <label style="margin-top:0;">📅 Оберіть дату для перегляду історії:</label>
    <input type="date" id="global-date" onchange="handleDateChange()">
  </div>

  <div id="teacher-screen" class="panel">
    <h2>👨‍🏫 Журнал: 2 клас</h2>
    
    <label>Предмет (згідно з розкладом):</label>
    <select id="t-subject" onchange="loadCurrentData()">
      </select>

    <label>Учень:</label>
    <select id="t-student" onchange="loadCurrentData()">
      <option value="">Оберіть учня...</option>
    </select>

    <label>Домашнє завдання:</label>
    <textarea id="t-hw" rows="2"></textarea>

    <label>Коментар для батьків:</label>
    <textarea id="t-comment" rows="2"></textarea>

    <button class="btn-save" onclick="saveData()">💾 Зберегти дані</button>
    <div id="status-msg">Збережено!</div>
    <button class="btn-logout" onclick="logoutUser()">Вийти</button>
  </div>

  <div id="parent-screen" class="panel">
    <h2 id="parent-welcome">👪 Кабінет батьків</h2>
    
    <label>Предмет:</label>
    <select id="p-subject" onchange="loadParentData()">
      </select>

    <div class="data-card">
      <strong>📚 Домашнє завдання:</strong>
      <p id="p-res-hw">Немає даних</p>
    </div>
    
    <div class="data-card" style="border-left-color: #ff4757;">
      <strong>📝 Коментар вчителя:</strong>
      <p id="p-res-comment">Немає коментарів</p>
    </div>

    <button class="btn-logout" onclick="logoutUser()">Вийти</button>
  </div>

</div>

<script src="schedule-class-2.js"></script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
  import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA3OA9pcR1zscUtEPWD8LEKTKonAN5Y90c",
    authDomain: "test-4eb3e.firebaseapp.com",
    databaseURL: "https://test-4eb3e-default-rtdb.europe-west1.firebasedatabase.app", 
    projectId: "test-4eb3e",
    storageBucket: "test-4eb3e.firebasestorage.app",
    messagingSenderId: "933339787450",
    appId: "1:933339787450:web:cc87b850ed3b4903f41283"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);

  let currentUserData = null;
  const dayKeys = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];

  // Встановлюємо сьогоднішню дату при завантаженні
  document.getElementById('global-date').valueAsDate = new Date();

  window.handleDateChange = function() {
    updateSubjectList();
    if (currentUserData.role === 'teacher') loadCurrentData();
    else loadParentData();
  };

  function updateSubjectList() {
    const dateVal = new Date(document.getElementById('global-date').value);
    const dayName = dayKeys[dateVal.getDay()];
    const subjects = window.schedule[dayName] || [];
    
    // Фільтруємо перерви та обіди
    const cleanSubjects = subjects.filter(s => s.number !== " " && s.subject.ua !== "Перерва");

    const targetId = currentUserData.role === 'teacher' ? 't-subject' : 'p-subject';
    const select = document.getElementById(targetId);
    select.innerHTML = '';

    cleanSubjects.forEach(s => {
      const opt = document.createElement('option');
      opt.value = s.subject.ua;
      opt.innerText = s.subject.ua;
      select.appendChild(opt);
    });
  }

  onAuthStateChanged(auth, (user) => {
    document.querySelectorAll('.panel').forEach(p => p.style.display = 'none');
    document.getElementById('calendar-block').style.display = 'none';

    if (user) {
      get(child(ref(db), `users/${user.uid}`)).then((snapshot) => {
        currentUserData = snapshot.exists() ? snapshot.val() : { role: "parent", studentName: "Іванов Іван", class: "class_2" };
        document.getElementById('calendar-block').style.display = 'block';
        
        if (currentUserData.role === 'teacher') {
          document.getElementById('teacher-screen').style.display = 'block';
          loadStudentsList();
        } else {
          document.getElementById('parent-screen').style.display = 'block';
          document.getElementById('parent-welcome').innerText = `👪 Кабінет: ${currentUserData.studentName}`;
        }
        updateSubjectList();
        handleDateChange();
      });
    } else {
      document.getElementById('login-screen').style.display = 'block';
    }
  });

  // Логіка вчителя: завантаження існуючих даних для редагування
  window.loadCurrentData = function() {
    const date = document.getElementById('global-date').value;
    const subject = document.getElementById('t-subject').value;
    const student = document.getElementById('t-student').value;
    
    // Очищуємо поля
    document.getElementById('t-hw').value = '';
    document.getElementById('t-comment').value = '';

    if (!subject) return;

    // Завантажуємо ДЗ
    get(child(ref(db), `homeworks/class_2/${date}/${subject}`)).then(snap => {
      if(snap.exists()) document.getElementById('t-hw').value = snap.val();
    });

    // Завантажуємо коментар
    if(student) {
      get(child(ref(db), `comments/class_2/${date}/${subject}/${student}`)).then(snap => {
        if(snap.exists()) document.getElementById('t-comment').value = snap.val();
      });
    }
  };

  window.saveData = function() {
    const date = document.getElementById('global-date').value;
    const subject = document.getElementById('t-subject').value;
    const student = document.getElementById('t-student').value;
    const hw = document.getElementById('t-hw').value;
    const comment = document.getElementById('t-comment').value;

    if (hw) set(ref(db, `homeworks/class_2/${date}/${subject}`), hw);
    if (comment && student) set(ref(db, `comments/class_2/${date}/${subject}/${student}`), comment);

    document.getElementById('status-msg').style.display = 'block';
    setTimeout(() => document.getElementById('status-msg').style.display = 'none', 2000);
  };

  window.loadParentData = function() {
    const date = document.getElementById('global-date').value;
    const subject = document.getElementById('p-subject').value;
    
    document.getElementById('p-res-hw').innerText = "Завантаження...";
    document.getElementById('p-res-comment').innerText = "Завантаження...";

    get(child(ref(db), `homeworks/class_2/${date}/${subject}`)).then(snap => {
      document.getElementById('p-res-hw').innerText = snap.exists() ? snap.val() : "Немає ДЗ";
    });

    get(child(ref(db), `comments/class_2/${date}/${subject}/${currentUserData.studentName}`)).then(snap => {
      document.getElementById('p-res-comment').innerText = snap.exists() ? snap.val() : "Коментарів немає";
    });
  };

  // --- РЕШТА ФУНКЦІЙ (login, logout, loadStudentsList) ЗАЛИШАЮТЬСЯ БЕЗ ЗМІН ---
  window.loginUser = function() {
    const email = document.getElementById('email').value;
    const pass = document.getElementById('pass').value;
    signInWithEmailAndPassword(auth, email, pass).catch(e => alert("Помилка входу"));
  };
  window.logoutUser = function() { signOut(auth); };
  window.loadStudentsList = function() {
    get(child(ref(db), `students_list/class_2`)).then((snapshot) => {
      const select = document.getElementById('t-student');
      select.innerHTML = '<option value="">Оберіть учня...</option>';
      if (snapshot.exists()) {
        Object.values(snapshot.val()).forEach(name => {
          const opt = document.createElement('option');
          opt.value = name; opt.innerText = name;
          select.appendChild(opt);
        });
      }
    });
  };
</script>

</body>
</html>
