<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Push School - Кабинет</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    body { 
      font-family: 'Montserrat', sans-serif; 
      background: linear-gradient(135deg, #f0f8ff, #e6e6fa);
      min-height: 100vh; margin: 0; display: flex; justify-content: center; align-items: center; padding: 20px;
    }
    .container { 
      background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px);
      max-width: 500px; width: 100%; padding: 30px; border-radius: 20px; 
      box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
    }
    h2 { color: #006d77; text-align: center; margin-top: 0; }
    label { display: block; margin-top: 15px; font-weight: 600; color: #333; font-size: 0.9rem; }
    input, select, textarea { 
      width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; 
      border-radius: 12px; box-sizing: border-box; font-family: inherit; font-size: 1rem;
    }
    button { 
      width: 100%; padding: 15px; border: none; border-radius: 12px; cursor: pointer; 
      font-weight: bold; font-size: 1rem; transition: 0.3s; margin-top: 20px;
    }
    .btn-login { background: linear-gradient(135deg, #00f2fe, #4facfe); color: white; }
    .btn-login:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0, 242, 254, 0.4); }
    .btn-logout { background: #ff4757; color: white; margin-top: 30px;}
    .btn-save { background: linear-gradient(135deg, #43e97b, #38f9d7); color: #1a1a1a; }
    
    .panel { display: none; }
    .data-card { background: #fff; padding: 15px; border-left: 4px solid #006d77; border-radius: 8px; margin-top: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    #status-msg { text-align: center; color: #2ed573; font-weight: bold; display: none; margin-top: 10px; }
  </style>
</head>
<body>

<div class="container">
  
  <div id="login-screen" class="panel" style="display: block;">
    <h2>Вход в портал</h2>
    <p style="text-align:center; font-size:0.9rem; color:#666;">Введите данные, выданные администратором</p>
    <label>Email</label>
    <input type="email" id="email" placeholder="Например: parent@test.com">
    <label>Пароль</label>
    <input type="password" id="pass" placeholder="******">
    <button class="btn-login" onclick="loginUser()">Войти</button>
    <p id="login-error" style="color:red; font-size:0.85rem; text-align:center; display:none; margin-top:15px; font-weight:bold;"></p>
  </div>

  <div id="teacher-screen" class="panel">
    <h2>👨‍🏫 Журнал: 2 класс</h2>
    
    <label>Предмет:</label>
    <select id="t-subject">
      <option value="Математика">Математика</option>
      <option value="Украинский язык">Украинский язык</option>
      <option value="Чтение">Чтение</option>
    </select>

    <label>Ученик:</label>
    <select id="t-student">
      <option value="Иванов Иван">Иванов Иван</option>
      <option value="Петрова Анна">Петрова Анна</option>
    </select>

    <label>Домашнее задание (для всего класса):</label>
    <textarea id="t-hw" rows="2" placeholder="Что задано на завтра?"></textarea>

    <label>Комментарий (видит только родитель):</label>
    <textarea id="t-comment" rows="2" placeholder="Как работал на уроке?"></textarea>

    <button class="btn-save" onclick="saveData()">💾 Сохранить в базу</button>
    <div id="status-msg">Данные сохранены!</div>
    
    <button class="btn-logout" onclick="logoutUser()">Выйти</button>
  </div>

  <div id="parent-screen" class="panel">
    <h2 id="parent-welcome" style="font-size: 1.2rem;">👪 Кабинет родителя</h2>
    
    <div id="parent-content">
      <label>Выберите предмет для просмотра:</label>
      <select id="p-subject" onchange="loadParentData()">
        <option value="Математика">Математика</option>
        <option value="Украинский язык">Украинский язык</option>
        <option value="Чтение">Чтение</option>
      </select>

      <div class="data-card">
        <strong>📚 Домашнее задание:</strong>
        <p id="p-res-hw" style="margin: 5px 0 0 0; color: #555; line-height: 1.4;">Загрузка...</p>
      </div>
      
      <div class="data-card" style="border-left-color: #ff4757;">
        <strong>📝 Личный комментарий учителя:</strong>
        <p id="p-res-comment" style="margin: 5px 0 0 0; color: #555; line-height: 1.4;">Загрузка...</p>
      </div>
    </div>

    <button class="btn-logout" onclick="logoutUser()">Выйти</button>
  </div>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
  import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

  // Твой конфиг
  const firebaseConfig = {
    apiKey: "AIzaSyA3OA9pcR1zscUtEPWD8LEKTKonAN5Y90c",
    authDomain: "test-4eb3e.firebaseapp.com",
    databaseURL: "https://test-4eb3e-default-rtdb.europe-west1.firebasedatabase.app", 
    projectId: "test-4eb3e",
    storageBucket: "test-4eb3e.firebasestorage.app",
    messagingSenderId: "933339787450",
    appId: "1:933339787450:web:cc87b850ed3b4903f41283",
    measurementId: "G-R68TXSH0T7"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);

  let currentUserData = null;

  // --- ЛОГИКА ВХОДА ---
  window.loginUser = function() {
    const email = document.getElementById('email').value.trim();
    const pass = document.getElementById('pass').value.trim();
    const errObj = document.getElementById('login-error');
    
    if(!email || !pass) {
      errObj.innerText = "Введите Email и Пароль";
      errObj.style.display = 'block';
      return;
    }

    errObj.style.display = 'none';
    
    signInWithEmailAndPassword(auth, email, pass)
      .catch((error) => {
        console.error("Auth Error:", error);
        errObj.innerText = "Ошибка: проверьте логин и пароль.";
        errObj.style.display = 'block';
      });
  };

  window.logoutUser = function() {
    signOut(auth);
  };

  // --- ОТСЛЕЖИВАНИЕ СТАТУСА ---
  onAuthStateChanged(auth, (user) => {
    document.querySelectorAll('.panel').forEach(p => p.style.display = 'none');

    if (user) {
      // Пытаемся получить данные из БД
      get(child(ref(db), `users/${user.uid}`)).then((snapshot) => {
        if (snapshot.exists()) {
          currentUserData = snapshot.val();
          if (currentUserData.role === 'teacher') {
            document.getElementById('teacher-screen').style.display = 'block';
          } else {
            document.getElementById('parent-screen').style.display = 'block';
            document.getElementById('parent-welcome').innerText = `👪 Кабинет: ${currentUserData.studentName}`;
            loadParentData();
          }
        } else {
          // Для теста, если юзера еще нет в таблице users
          currentUserData = { role: "parent", studentName: "Иванов Иван", class: "class_2" };
          document.getElementById('parent-screen').style.display = 'block';
          loadParentData();
        }
      }).catch((error) => {
        console.error("Database Error:", error);
        document.getElementById('parent-screen').style.display = 'block';
        document.getElementById('parent-welcome').innerText = "⚠️ Ошибка БД";
        document.getElementById('parent-content').innerHTML = `
          <div style="background: #ffeaa7; padding: 15px; border-radius: 8px; margin-top: 15px;">
            <small style="color:red;">Тех. ошибка: ${error.message}</small>
          </div>
        `;
      });
    } else {
      document.getElementById('login-screen').style.display = 'block';
    }
  });

  // --- ЛОГИКА УЧИТЕЛЯ (СОХРАНЕНИЕ) ---
  window.saveData = function() {
    const subject = document.getElementById('t-subject').value;
    const student = document.getElementById('t-student').value;
    const hwText = document.getElementById('t-hw').value;
    const commentText = document.getElementById('t-comment').value;
    const today = new Date().toISOString().split('T')[0];

    if (hwText) {
      set(ref(db, `homeworks/class_2/${today}/${subject}`), hwText).catch(e => alert("Ошибка сохранения ДЗ: " + e.message));
    }

    if (commentText) {
      set(ref(db, `comments/class_2/${today}/${subject}/${student}`), commentText).catch(e => alert("Ошибка сохранения комментария: " + e.message));
    }

    const statusMsg = document.getElementById('status-msg');
    statusMsg.style.display = 'block';
    setTimeout(() => statusMsg.style.display = 'none', 3000);
    
    // Очищаем поля после сохранения
    document.getElementById('t-hw').value = '';
    document.getElementById('t-comment').value = '';
  };

  // --- ЛОГИКА РОДИТЕЛЯ (ЧТЕНИЕ) ---
  window.loadParentData = function() {
    if (!currentUserData) return;
    
    const subject = document.getElementById('p-subject').value;
    const today = new Date().toISOString().split('T')[0];

    const hwEl = document.getElementById('p-res-hw');
    const commentEl = document.getElementById('p-res-comment');
    
    hwEl.innerText = "Загрузка...";
    commentEl.innerText = "Загрузка...";

    // Читаем ДЗ
    get(child(ref(db), `homeworks/${currentUserData.class}/${today}/${subject}`)).then((snapshot) => {
      hwEl.innerText = snapshot.exists() ? snapshot.val() : "ДЗ пока не добавлено.";
    }).catch(e => hwEl.innerText = "Ошибка чтения: " + e.message);

    // Читаем Комментарий
    get(child(ref(db), `comments/${currentUserData.class}/${today}/${subject}/${currentUserData.studentName}`)).then((snapshot) => {
      commentEl.innerText = snapshot.exists() ? snapshot.val() : "Комментариев нет.";
    }).catch(e => commentEl.innerText = "Ошибка чтения: " + e.message);
  };
</script>

</body>
</html>
